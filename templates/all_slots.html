<!DOCTYPE html>
{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<html>
<head>
    <title>Available Slots</title>
</head>
<body>

    <h2>Available Slots</h2>

    <table border="1">
        <tr>
            <th>Tutor ID</th>
            <th>Date</th>
            <th>Time</th>
            <th>Action</th>
        </tr>

        {% for slot in slots %}
        <tr>
            <td>{{ slot['tutor_id'] }}</td>
            <td>{{ slot['date'] }}</td>
            <td>{{ slot['time'] }}</td>
            <td>
                <a href="/book/{{ slot['id'] }}">Book</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>

{% endblock %}
