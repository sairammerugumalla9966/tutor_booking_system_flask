{% extends 'base.html' %}

{% block content %}

<h2>All Users 👥</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Approved</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.role }}</td>
        <td>{{ user.is_approved }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
