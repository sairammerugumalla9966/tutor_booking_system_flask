{% extends 'base.html' %}

{% block content %}

<h2>Pending Tutor Approvals 👨‍🏫</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Action</th>
    </tr>

    {% for tutor in tutors %}
    <tr>
        <td>{{ tutor.name }}</td>
        <td>{{ tutor.email }}</td>
        <td>
            <a href="/admin/approve/{{ tutor.id }}">Approve</a>
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
